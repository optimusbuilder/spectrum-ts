name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    uses: photon-hq/buildspace/.github/workflows/typescript-service-release.yaml@main
    with:
      service-name: spectrum-ts
      working-directory: packages/spectrum-ts
      build-command: "bun run build"
      publish-command: "bunx clean-publish --package-manager npm"
      dry-run: false
    secrets: inherit
